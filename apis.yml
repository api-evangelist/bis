apis:
  - aid: bis:bis-stats-api
    name: BIS Stats API
    description: The BIS SDMX RESTful API provides programmatic access to data and metadata published on the BIS Data Portal, including international banking statistics, debt securities, credit data, derivatives, property prices, exchange rates, and central bank statistics. Implemented as a subset of the official SDMX RESTful API v1.4.0.
